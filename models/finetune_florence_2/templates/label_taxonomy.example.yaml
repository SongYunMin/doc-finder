version: 1
task_name: geotag
prompt_prefix: "<GeoTag>"

categories:
  shapes:
    - triangle
    - circle
    - line_segment
    - quadrilateral
    - arc
  relations:
    - parallel
    - perpendicular
    - intersecting
    - tangent
  labels:
    - point_a
    - point_b
    - point_c
    - point_d
    - angle_label
    - length_label
  geometry_terms:
    - radius
    - diameter
    - central_angle
    - right_angle

naming_rules:
  - "동의어를 허용하지 말고 대표 표기 하나만 유지한다."
  - "태그는 소문자 스네이크 또는 단일 토큰 형태를 우선한다."
  - "검색에 직접 안 쓰는 세부 태그는 초반 taxonomy에서 제외한다."

forbidden_examples:
  - "triangular shape"
  - "point A"
  - "90 degree angle"

preferred_replacements:
  triangular shape: triangle
  point A: point_a
  90 degree angle: right_angle
